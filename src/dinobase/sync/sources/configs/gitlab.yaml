name: gitlab
description: "GitLab (projects, issues, merge requests, pipelines, jobs, users, groups, milestones)"
oauth: true
credentials:
  - name: token
    flag: "--token"
    env: GITLAB_TOKEN
    prompt: "GitLab personal access token"
    secret: true

client:
  base_url: "https://gitlab.com/api/v4/"
  auth:
    type: bearer
    token: "{token}"
  # GitLab uses offset-based (page-number) pagination by default.
  # Response headers: x-page, x-next-page, x-total-pages, x-per-page.
  # For datasets >10 000 records x-total and x-total-pages are omitted;
  # the paginator should stop when x-next-page header is absent/empty.
  paginator:
    type: page_number
    page_param: "page"
    page_size_param: "per_page"
    page_size: 100
    base_page: 1
    next_page_header: "x-next-page"

resource_defaults:
  primary_key: id
  write_disposition: merge
  # GitLab returns bare JSON arrays — no data_selector needed.

resources:
  # All projects the authenticated user is a member of.
  # Supports updated_after (ISO 8601) and keyset pagination for >50 000 projects.
  - name: projects
    endpoint:
      path: projects
      params:
        membership: true
    incremental:
      cursor_path: updated_at
      param: updated_after
      initial_value: "2024-01-01T00:00:00Z"

  # All issues visible to the authenticated user (across all projects).
  # updated_after / created_after both supported (ISO 8601).
  - name: issues
    endpoint:
      path: issues
    incremental:
      cursor_path: updated_at
      param: updated_after
      initial_value: "2024-01-01T00:00:00Z"

  # All merge requests visible to the authenticated user (across all projects).
  # updated_after / created_after both supported.
  - name: merge_requests
    endpoint:
      path: merge_requests
    incremental:
      cursor_path: updated_at
      param: updated_after
      initial_value: "2024-01-01T00:00:00Z"

  # Pipelines are project-scoped; requires {project_id} path variable.
  # updated_after / created_after supported (ISO 8601).
  - name: pipelines
    endpoint:
      path: projects/{project_id}/pipelines
    incremental:
      cursor_path: updated_at
      param: updated_after
      initial_value: "2024-01-01T00:00:00Z"

  # Jobs are project-scoped; requires {project_id} path variable.
  # No date-filter params; filtered by scope (status) only.
  - name: jobs
    endpoint:
      path: projects/{project_id}/jobs

  # Users list (admin-only for full access; regular users see public profiles).
  # created_after / created_before supported.
  - name: users
    endpoint:
      path: users
    incremental:
      cursor_path: created_at
      param: created_after
      initial_value: "2024-01-01T00:00:00Z"

  # Top-level groups the authenticated user can see.
  # No date-filter params available on this endpoint.
  - name: groups
    endpoint:
      path: groups

  # Project milestones; requires {project_id} path variable.
  # updated_after / updated_before supported (ISO 8601).
  - name: milestones
    endpoint:
      path: projects/{project_id}/milestones
    incremental:
      cursor_path: updated_at
      param: updated_after
      initial_value: "2024-01-01T00:00:00Z"

write_endpoints:
  # Issues
  - name: create_issue
    description: "Create a new issue in a project"
    method: POST
    path: projects/{project_id}/issues

  - name: update_issue
    description: "Update an existing issue"
    method: PUT
    path: projects/{project_id}/issues/{issue_iid}

  # Merge requests
  - name: create_merge_request
    description: "Create a new merge request in a project"
    method: POST
    path: projects/{project_id}/merge_requests

  - name: update_merge_request
    description: "Update an existing merge request"
    method: PUT
    path: projects/{project_id}/merge_requests/{merge_request_iid}

  # Projects
  - name: create_project
    description: "Create a new project"
    method: POST
    path: projects

  - name: update_project
    description: "Update an existing project"
    method: PUT
    path: projects/{project_id}
