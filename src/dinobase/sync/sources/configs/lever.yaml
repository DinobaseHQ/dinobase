name: lever
description: "Lever ATS (opportunities, postings, candidates, stages, users, archive_reasons, tags)"
oauth: true
# Lever API keys are generated in Settings → Integrations → API Credentials.
# The key is used as the HTTP Basic Auth username; the password is always empty.
# OAuth is also supported (access token used as username in the same Basic Auth scheme).
credentials:
  - name: api_key
    flag: "--api-key"
    env: LEVER_API_KEY
    prompt: "Lever API key (Settings → Integrations → API Credentials)"
    secret: true

client:
  # All Lever v1 REST endpoints share this base URL.
  # Sandbox: https://api.sandbox.lever.co/v1/
  base_url: "https://api.lever.co/v1/"
  auth:
    # Lever uses HTTP Basic Auth: API key as username, password empty.
    # OAuth access tokens follow the same pattern (token as username, password empty).
    type: http_basic
    username: "{api_key}"
    password: ""
  # Lever uses cursor-based pagination.
  # Each list response includes:
  #   "next"    – opaque offset token to pass as ?offset= on the next request
  #   "hasNext" – boolean; false when the current page is the last one
  # Default page size: 50 records. Maximum: 100 (via limit param).
  paginator:
    type: cursor
    cursor_path: "next"
    cursor_param: "offset"
    has_more_path: "hasNext"
    default_limit: 100
    limit_param: "limit"

resource_defaults:
  primary_key: id
  write_disposition: merge
  endpoint:
    method: GET
    # All Lever list responses wrap the record array in a top-level "data" key.
    data_selector: "data"
    params:
      limit: 100

resources:
  # ── Opportunities ─────────────────────────────────────────────────────────────
  # GET /v1/opportunities
  # Lists all opportunities (applicants) in the workspace.
  # Supports incremental sync via updated_at_start (millisecond epoch timestamp).
  # The updatedAt field on each record reflects the most recent change.
  # Lever recommends sorting by updatedAt ascending for reliable incremental loads.
  # Response: { data: [...], next: "<token>", hasNext: true|false }
  - name: opportunities
    endpoint:
      path: "opportunities"
      params:
        # Return only non-archived opportunities by default. Set to "true" to include
        # archived, or "false" to exclude. Omit to get all.
        # include_archived: "true"
        sort: "updatedAt"
    incremental:
      # updatedAt is a Unix millisecond timestamp on each opportunity record.
      cursor_path: "updatedAt"
      # updated_at_start accepts a millisecond epoch integer (e.g. 1700000000000).
      param: "updated_at_start"
      initial_value: "0"

  # ── Postings ──────────────────────────────────────────────────────────────────
  # GET /v1/postings
  # Lists all job postings (published, internal, draft, rejected, pending, closed).
  # Does not support updated_at_start filtering; full refresh only.
  # Optionally filter by state: published|internal|pending|rejected|draft|closed.
  # Response: { data: [...], next: "<token>", hasNext: true|false }
  - name: postings
    endpoint:
      path: "postings"

  # ── Candidates ────────────────────────────────────────────────────────────────
  # GET /v1/candidates
  # Lists all candidate profiles in the workspace.
  # A candidate can have multiple opportunities; this resource returns the person
  # record, not the application.
  # Does not support updated_at_start; full refresh only.
  # Response: { data: [...], next: "<token>", hasNext: true|false }
  - name: candidates
    endpoint:
      path: "candidates"

  # ── Stages ────────────────────────────────────────────────────────────────────
  # GET /v1/stages
  # Lists all interview pipeline stages configured in the workspace.
  # Small, mostly static list. No incremental support.
  # Response: { data: [...] }  (typically no pagination — small dataset)
  - name: stages
    endpoint:
      path: "stages"

  # ── Users ─────────────────────────────────────────────────────────────────────
  # GET /v1/users
  # Lists all Lever users (team members, hiring managers, interviewers, admins).
  # Supports filtering by role: admin|interviewer|limited|team_member|super_admin.
  # No incremental support.
  # Response: { data: [...], next: "<token>", hasNext: true|false }
  - name: users
    endpoint:
      path: "users"

  # ── Archive Reasons ───────────────────────────────────────────────────────────
  # GET /v1/archive_reasons
  # Lists all configured reasons for archiving an opportunity (e.g. "Hired",
  # "Withdrawn", "Position closed"). Small static dataset; no incremental support.
  # Response: { data: [...] }
  - name: archive_reasons
    endpoint:
      path: "archive_reasons"

  # ── Tags ──────────────────────────────────────────────────────────────────────
  # GET /v1/tags
  # Lists all tags defined in the workspace, along with the count of opportunities
  # each tag is applied to. Small static dataset; no incremental support.
  # Response: { data: [...] }
  - name: tags
    endpoint:
      path: "tags"

write_endpoints:
  # ── Opportunities ─────────────────────────────────────────────────────────────
  # POST /v1/opportunities
  # Creates a new opportunity (applicant). At minimum supply a name, and optionally
  # a posting ID, stage ID, origin, email, phone, links, and custom fields.
  # Body: { name, headline, stage, location, links, phones, emails, tags,
  #         sources, origin, postings, archived, ... }
  - name: create_opportunity
    description: "Create a new opportunity (applicant). name is required; postings, stage, emails, phones, tags, and origin are optional."
    method: POST
    path: "opportunities"

  # PATCH /v1/opportunities/{opportunityId}
  # Partially updates an existing opportunity.
  # Editable fields: name, headline, location, links, phones, emails, tags, sources,
  # stage, owner, followers, contact (candidate name/headline).
  - name: update_opportunity
    description: "Partially update an opportunity by ID. Supply only the fields to change."
    method: PATCH
    path: "opportunities/{opportunityId}"

  # POST /v1/opportunities/{opportunityId}/stage
  # Moves an opportunity to a different pipeline stage.
  # Body: { stage: "<stageId>" }
  - name: advance_opportunity_stage
    description: "Advance an opportunity to a new pipeline stage. Body: { stage: <stageId> }."
    method: POST
    path: "opportunities/{opportunityId}/stage"

  # POST /v1/opportunities/{opportunityId}/archived
  # Archives an opportunity with a reason.
  # Body: { reason: "<archiveReasonId>" }
  - name: archive_opportunity
    description: "Archive an opportunity. Body: { reason: <archiveReasonId> }."
    method: POST
    path: "opportunities/{opportunityId}/archived"

  # DELETE /v1/opportunities/{opportunityId}/archived
  # Restores (unarchives) a previously archived opportunity.
  - name: unarchive_opportunity
    description: "Restore an archived opportunity back to active pipeline."
    method: DELETE
    path: "opportunities/{opportunityId}/archived"

  # ── Postings ──────────────────────────────────────────────────────────────────
  # POST /v1/postings
  # Creates a new job posting. text (the role description) and categories are required;
  # state defaults to "draft". Supply requisitionCode to link to a requisition.
  # Body: { text, state, categories: { team, department, location, commitment },
  #         content: { description, descriptionHtml, lists, closing, closingHtml },
  #         tags, userDefinedId, distributionChannels, reqCode, ... }
  - name: create_posting
    description: "Create a new job posting. text (job name) and categories are required; state defaults to draft."
    method: POST
    path: "postings"

  # PATCH /v1/postings/{postingId}
  # Partially updates an existing posting's content, state, or categories.
  # Editable: text, state, categories, content, tags, distributionChannels, userDefinedId.
  - name: update_posting
    description: "Partially update a job posting by ID. Supply only the fields to change."
    method: PATCH
    path: "postings/{postingId}"

  # POST /v1/postings/{postingId}/apply
  # Submits a new application against a posting (creates an opportunity).
  # Useful for integrating with careers-page forms.
  # Body: { name, email, phone, org, urls, comments, resume (base64), ... }
  - name: apply_to_posting
    description: "Submit an application against a posting, creating a new opportunity. name and email are required."
    method: POST
    path: "postings/{postingId}/apply"
