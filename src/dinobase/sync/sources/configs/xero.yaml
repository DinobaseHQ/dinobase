name: xero
description: "Xero Accounting API (invoices, contacts, accounts, bank_transactions, payments, credit_notes, purchase_orders, items, organisations)"
oauth: true
# Xero uses OAuth 2.0 for authentication. Generate an access token via the OAuth 2.0 flow.
# Each API call must also supply the Xero-Tenant-Id header identifying which organisation
# to query. The tenant ID is the organisation's Xero identifier (UUID), obtainable from
# GET https://api.xero.com/connections after completing OAuth.
credentials:
  - name: oauth_token
    flag: "--token"
    env: XERO_OAUTH_TOKEN
    prompt: "Xero OAuth 2.0 access token"
    secret: true
  - name: tenant_id
    flag: "--tenant-id"
    env: XERO_TENANT_ID
    prompt: "Xero tenant ID (organisation UUID from GET /connections)"
    secret: false

client:
  base_url: "https://api.xero.com/api.xro/2.0/"
  auth:
    # Xero OAuth 2.0: pass the access token as a Bearer token in the Authorization header.
    type: bearer
    token: "{oauth_token}"
  headers:
    # Required on every request. Identifies which Xero organisation to query.
    # Without this header the API returns 403 Forbidden.
    Xero-Tenant-Id: "{tenant_id}"
    # Request JSON responses; Xero also supports XML but JSON is preferred.
    Accept: "application/json"
  # Xero uses page-number pagination for most transactional resources.
  # Pass ?page=N (1-based) to retrieve successive pages of 100 records each.
  # A page that returns fewer than 100 records (or 0 records) is the last page.
  # Some endpoints also accept ?pageSize= (max 1000) where documented.
  paginator:
    type: page
    page_param: "page"
    start_page: 1
    page_size: 100
    stop_condition: "len(data) < page_size"

resource_defaults:
  primary_key: id
  write_disposition: merge
  endpoint:
    # Xero list responses wrap the records array in a top-level key that matches
    # the resource name in PascalCase (e.g. {"Invoices": [...], "Status": "OK"}).
    # Each resource overrides data_selector to its specific wrapper key.
    params:
      # Order results by UpdatedDateUTC ascending so incremental cursors advance
      # monotonically. Xero uses "order" as the sort query parameter.
      order: "UpdatedDateUTC ASC"

resources:

  # ── Invoices ────────────────────────────────────────────────────────────────
  # GET /Invoices — page-based pagination, 100/page (default), up to 1000 with pageSize.
  # Supports If-Modified-Since header (RFC 1123) for incremental loads.
  # Also supports ModifiedAfter query param (ISO 8601 UTC) as an alternative.
  # Response wrapper key: "Invoices". Primary key: InvoiceID (UUID).
  # Relevant scopes: accounting.transactions, accounting.transactions.read
  - name: invoices
    primary_key: InvoiceID
    endpoint:
      path: "Invoices"
      data_selector: "Invoices"
      params:
        # Include archived invoices so deletes/voids are captured.
        includeArchived: true
    incremental:
      # UpdatedDateUTC is a Xero .NET JSON date string (/Date(ms+offset)/).
      # The runtime should convert to ISO 8601 when building the header value.
      cursor_path: "UpdatedDateUTC"
      # Xero honours the standard If-Modified-Since HTTP header on GET requests.
      # Pass an RFC 1123 date (e.g. "Mon, 01 Jan 2024 00:00:00 GMT").
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Contacts ─────────────────────────────────────────────────────────────────
  # GET /Contacts — page-based pagination, 100/page.
  # Supports If-Modified-Since header and includeArchived param.
  # Response wrapper key: "Contacts". Primary key: ContactID (UUID).
  # Relevant scopes: accounting.contacts, accounting.contacts.read
  - name: contacts
    primary_key: ContactID
    endpoint:
      path: "Contacts"
      data_selector: "Contacts"
      params:
        includeArchived: true
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Accounts ──────────────────────────────────────────────────────────────────
  # GET /Accounts — returns the chart of accounts. Small list; no page pagination.
  # Supports If-Modified-Since header for incremental polling.
  # Response wrapper key: "Accounts". Primary key: AccountID (UUID).
  # Relevant scopes: accounting.settings, accounting.settings.read
  - name: accounts
    primary_key: AccountID
    endpoint:
      path: "Accounts"
      data_selector: "Accounts"
      # Accounts is a small, non-paginated endpoint; disable the default paginator.
      paginator:
        type: none
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Bank Transactions ─────────────────────────────────────────────────────────
  # GET /BankTransactions — page-based pagination, 100/page.
  # Supports If-Modified-Since header and pageSize (up to 1000).
  # Response wrapper key: "BankTransactions". Primary key: BankTransactionID (UUID).
  # Relevant scopes: accounting.transactions, accounting.transactions.read
  - name: bank_transactions
    primary_key: BankTransactionID
    endpoint:
      path: "BankTransactions"
      data_selector: "BankTransactions"
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Payments ──────────────────────────────────────────────────────────────────
  # GET /Payments — page-based pagination, 100/page.
  # Supports If-Modified-Since header for incremental loads.
  # Response wrapper key: "Payments". Primary key: PaymentID (UUID).
  # Relevant scopes: accounting.transactions, accounting.transactions.read
  - name: payments
    primary_key: PaymentID
    endpoint:
      path: "Payments"
      data_selector: "Payments"
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Credit Notes ──────────────────────────────────────────────────────────────
  # GET /CreditNotes — page-based pagination, 100/page.
  # Supports If-Modified-Since header and includeArchived param.
  # Response wrapper key: "CreditNotes". Primary key: CreditNoteID (UUID).
  # Relevant scopes: accounting.transactions, accounting.transactions.read
  - name: credit_notes
    primary_key: CreditNoteID
    endpoint:
      path: "CreditNotes"
      data_selector: "CreditNotes"
      params:
        includeArchived: true
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Purchase Orders ───────────────────────────────────────────────────────────
  # GET /PurchaseOrders — page-based pagination, 100/page.
  # Supports If-Modified-Since header for incremental loads.
  # Response wrapper key: "PurchaseOrders". Primary key: PurchaseOrderID (UUID).
  # Relevant scopes: accounting.transactions, accounting.transactions.read
  - name: purchase_orders
    primary_key: PurchaseOrderID
    endpoint:
      path: "PurchaseOrders"
      data_selector: "PurchaseOrders"
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Items ─────────────────────────────────────────────────────────────────────
  # GET /Items — returns the product/service catalogue. Moderate list size.
  # Supports If-Modified-Since header. No page-based pagination documented.
  # Response wrapper key: "Items". Primary key: ItemID (UUID).
  # Relevant scopes: accounting.settings, accounting.settings.read
  - name: items
    primary_key: ItemID
    endpoint:
      path: "Items"
      data_selector: "Items"
      paginator:
        type: none
    incremental:
      cursor_path: "UpdatedDateUTC"
      header: "If-Modified-Since"
      initial_value: "Mon, 01 Jan 2024 00:00:00 GMT"

  # ── Organisations ─────────────────────────────────────────────────────────────
  # GET /Organisations — returns details of the connected organisation(s).
  # Single-page response; no pagination or If-Modified-Since support.
  # Response wrapper key: "Organisations". Primary key: OrganisationID (UUID).
  # Relevant scopes: accounting.settings, accounting.settings.read
  - name: organisations
    primary_key: OrganisationID
    endpoint:
      path: "Organisations"
      data_selector: "Organisations"
      paginator:
        type: none
      params:
        order: null  # Organisations does not support order; clear the default.

write_endpoints:

  # ── Invoices ──────────────────────────────────────────────────────────────────

  # Create one or more new invoices.
  # POST /Invoices
  # Required fields: Type (ACCREC|ACCPAY), Contact.ContactID
  # Common fields: LineItems, Date, DueDate, Reference, Status, CurrencyCode,
  #               LineAmountTypes, SubTotal, TotalTax, Total, InvoiceNumber
  - name: create_invoice
    description: "Create a new invoice (ACCREC for sales, ACCPAY for bills). Type and Contact.ContactID are required."
    method: POST
    path: "Invoices"

  # Update an existing invoice by InvoiceID.
  # POST /Invoices/{InvoiceID}
  # Xero uses POST (not PUT/PATCH) for updates on single-record paths.
  # Common fields: Status, DueDate, Reference, LineItems, CurrencyCode
  - name: update_invoice
    description: "Update an existing invoice by InvoiceID. Use Status=VOIDED to void, Status=DELETED to delete drafts."
    method: POST
    path: "Invoices/{InvoiceID}"

  # Approve a draft invoice (transition to SUBMITTED/AUTHORISED).
  # POST /Invoices/{InvoiceID} with Status=AUTHORISED
  # Shortcut write endpoint for the most common status transition.
  - name: approve_invoice
    description: "Approve a draft invoice by setting its status to AUTHORISED."
    method: POST
    path: "Invoices/{InvoiceID}"

  # ── Contacts ──────────────────────────────────────────────────────────────────

  # Create one or more new contacts.
  # POST /Contacts
  # Required fields: Name
  # Common fields: FirstName, LastName, EmailAddress, AccountNumber, Phones,
  #               Addresses, ContactGroups, TaxNumber, IsCustomer, IsSupplier
  - name: create_contact
    description: "Create a new contact (customer or supplier). Name is required."
    method: POST
    path: "Contacts"

  # Update an existing contact by ContactID.
  # POST /Contacts/{ContactID}
  # Common fields: Name, FirstName, LastName, EmailAddress, Phones, Addresses,
  #               ContactStatus (ACTIVE|ARCHIVED), TaxNumber, AccountNumber
  - name: update_contact
    description: "Update an existing contact by ContactID. Set ContactStatus=ARCHIVED to archive."
    method: POST
    path: "Contacts/{ContactID}"

  # ── Payments ──────────────────────────────────────────────────────────────────

  # Create a payment against an invoice, credit note, or prepayment.
  # POST /Payments
  # Required fields: Invoice.InvoiceID (or CreditNote.CreditNoteID), Account.AccountID,
  #                  Date, Amount
  # Common fields: Reference, CurrencyRate, IsReconciled, PaymentType
  - name: create_payment
    description: "Apply a payment to an invoice or credit note. Invoice.InvoiceID (or CreditNote.CreditNoteID), Account.AccountID, Date, and Amount are required."
    method: POST
    path: "Payments"

  # Delete (void) a payment by PaymentID.
  # POST /Payments/{PaymentID} with Status=DELETED
  # Xero does not expose a DELETE method on payments; setting Status=DELETED voids it.
  - name: void_payment
    description: "Void an existing payment by setting Status=DELETED. PaymentID in path, body: {\"Status\": \"DELETED\"}."
    method: POST
    path: "Payments/{PaymentID}"
