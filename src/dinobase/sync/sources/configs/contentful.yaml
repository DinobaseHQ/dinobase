name: contentful
description: "Contentful CMS (entries, assets, content_types, locales, tags) via the Content Delivery API; write operations via the Content Management API"
oauth: true
# ── Credentials ────────────────────────────────────────────────────────────────
# Contentful uses two separate access tokens:
#   - access_token  : Content Delivery API (CDA) token — read-only, scoped to a space.
#                     Created under Space Settings → API Keys.
#   - management_token : Content Management API (CMA) token — read/write.
#                       Created under Account Settings → Personal Access Tokens.
#                       Only required when using write_endpoints.
# space_id    : The 12-character space identifier, visible in the dashboard URL.
# environment : The environment slug (default: "master"). Overridable per space.
credentials:
  - name: access_token
    flag: "--access-token"
    env: CONTENTFUL_ACCESS_TOKEN
    prompt: "Contentful Content Delivery API access token"
    secret: true

  - name: space_id
    flag: "--space-id"
    env: CONTENTFUL_SPACE_ID
    prompt: "Contentful space ID (e.g. abc123xyz456)"
    secret: false

  - name: environment
    flag: "--environment"
    env: CONTENTFUL_ENVIRONMENT
    prompt: "Contentful environment slug (default: master)"
    secret: false

# ── Client ─────────────────────────────────────────────────────────────────────
# Base URL:  https://cdn.contentful.com  (EU: https://cdn.eu.contentful.com)
# Auth:      Bearer token via Authorization header.
# Alt auth:  access_token query param is also accepted; the header method is
#            used here as it keeps credentials out of server logs.
#
# Pagination:
#   All CDA list endpoints use skip/limit offset pagination.
#   Response envelope:
#     { "sys": {"type": "Array"}, "total": N, "skip": N, "limit": N, "items": [...] }
#   Maximum page size: 1 000 items (hard limit enforced server-side).
#   Rate limit: 55 requests/second; cached responses are unlimited.
#   HTTP 429 is returned when the limit is exceeded; the X-Contentful-RateLimit-Reset
#   header indicates seconds until the limit resets.
client:
  base_url: "https://cdn.contentful.com/spaces/{space_id}/environments/{environment}/"
  auth:
    type: bearer
    token: "{access_token}"
  # Offset-based pagination: send skip=N on each request, increment by limit.
  # Stop when (skip + limit) >= total, or when the returned items array is shorter
  # than the requested limit.
  paginator:
    type: offset
    limit_param: "limit"
    offset_param: "skip"
    total_path: "total"
    default_limit: 1000

# ── Resource Defaults ──────────────────────────────────────────────────────────
# Contentful resources nest their unique identifier at sys.id, not at a top-level
# id field. The primary_key references the nested path so the loader can deduplicate
# rows correctly on upsert.
# All list responses place records in the "items" array.
resource_defaults:
  primary_key: "sys.id"
  write_disposition: merge
  endpoint:
    data_selector: "items"
    params:
      # Return up to the maximum page size on every request.
      limit: 1000

# ── Resources (Read Endpoints) ─────────────────────────────────────────────────
resources:

  # ── Entries ───────────────────────────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/entries
  # Returns all published entries across all content types.
  # Supports filter by content_type, field values, locale, and ordering.
  # Incremental sync is achieved via the dedicated /sync endpoint (see sync_entries
  # below); the standard list endpoint here loads the full published set.
  # Key query params:
  #   content_type  – filter to a single content type ID
  #   include       – resolve linked entries/assets inline (0–10; default 1)
  #   locale        – return a specific locale (default: default locale)
  #   order         – e.g. sys.updatedAt for stable incremental ordering
  #   sys.updatedAt[gt] – filter entries updated after an ISO 8601 timestamp
  - name: entries
    endpoint:
      path: "entries"
      params:
        order: "sys.updatedAt"
        # include=0 avoids embedding linked resources in the response, keeping
        # each page self-contained and reducing payload size during bulk loads.
        include: 0
    incremental:
      cursor_path: "sys.updatedAt"
      param: "sys.updatedAt[gt]"
      initial_value: "1970-01-01T00:00:00Z"

  # ── Assets ────────────────────────────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/assets
  # Returns all published assets (images, files, videos, etc.).
  # Each asset has a fields.file object containing url, contentType, and fileName.
  # Supports sys.updatedAt[gt] for incremental loads.
  - name: assets
    endpoint:
      path: "assets"
      params:
        order: "sys.updatedAt"
    incremental:
      cursor_path: "sys.updatedAt"
      param: "sys.updatedAt[gt]"
      initial_value: "1970-01-01T00:00:00Z"

  # ── Content Types ──────────────────────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/content_types
  # Returns the schema definitions for all content types in the environment.
  # Each content type lists its fields array (id, name, type, validations, etc.).
  # Content types rarely change so incremental filtering is not applied.
  - name: content_types
    endpoint:
      path: "content_types"
      params:
        order: "sys.id"

  # ── Locales ────────────────────────────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/locales
  # Returns all locale definitions for the environment (code, name, default flag,
  # fallbackCode). This is a small, static list; no pagination required in practice.
  - name: locales
    endpoint:
      path: "locales"

  # ── Tags ──────────────────────────────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/tags
  # Returns all tags defined in the environment. Tags are applied to entries and
  # assets and are used to control access via Team space membership.
  # Response envelope matches the standard Array type with items and total.
  # Note: tags use sys.id as their identifier (same as other resources), but the
  # name field is at the top level, not inside fields.
  - name: tags
    endpoint:
      path: "tags"
      params:
        order: "sys.id"

  # ── Sync (Incremental Delta Load) ─────────────────────────────────────────────
  # GET /spaces/{space_id}/environments/{env}/sync?initial=true
  #
  # The Contentful Sync API is designed for incremental loading. It delivers all
  # content changes (create, update, publish, unpublish, delete) since the last
  # sync token was issued.
  #
  # Initial call:   ?initial=true  — retrieves the full current state of the space.
  # Subsequent:     ?syncToken=<token>  — retrieves only changes since that token.
  #
  # Response fields:
  #   items        – array of typed payloads (Entry, Asset, DeletedEntry, DeletedAsset)
  #   nextPageUrl  – present when the result set spans multiple pages; fetch it to
  #                  continue collecting items from the same sync snapshot.
  #   nextSyncUrl  – present on the final page; the URL contains the syncToken to
  #                  use on the next incremental sync call.
  #
  # Item sys.type values:
  #   "Entry"         – a published or updated entry
  #   "Asset"         – a published or updated asset
  #   "DeletedEntry"  – an entry that was deleted or unpublished
  #   "DeletedAsset"  – an asset that was deleted or unpublished
  #
  # Optional filter params (only valid on initial=true):
  #   type          – Entry | Asset | Deletion | DeletedAsset | DeletedEntry
  #   content_type  – restrict to a single content type ID
  #
  # Max page size: 1 000 items per response page.
  # Note: unlike standard list endpoints, the Sync API does not support the
  # skip/limit paginator; pagination is cursor-driven via nextPageUrl / nextSyncUrl.
  - name: sync_entries
    endpoint:
      path: "sync"
      params:
        initial: "true"
        # Uncomment to restrict to entries only (excludes assets):
        # type: "Entry"
    # The paginator override below disables offset pagination for this resource.
    # The runtime must follow nextPageUrl until it is absent, then persist the
    # syncToken extracted from nextSyncUrl for subsequent incremental calls.
    paginator:
      type: cursor
      cursor_path: "nextPageUrl"
      cursor_param: "__next_page_url__"
      # nextSyncUrl carries the token for the next incremental call. The runtime
      # should extract and store the token from this field after the last page.
      next_sync_url_path: "nextSyncUrl"

# ── Write Endpoints ────────────────────────────────────────────────────────────
# Write operations target the Content Management API (CMA), which has a different
# base URL (api.contentful.com vs cdn.contentful.com) and requires a separate
# management access token.
#
# CMA base URL: https://api.contentful.com/spaces/{space_id}/environments/{env}/
# Auth:         Bearer token using the management_token credential.
# Content-Type: application/vnd.contentful.management.v1+json
#
# Optimistic locking: PUT and PATCH operations require the X-Contentful-Version
# header set to the current sys.version of the resource. Mismatches return 409.
#
# Entry publish lifecycle:
#   1. Create / update the draft entry  (PUT /entries/{id})
#   2. Publish the entry                (PUT /entries/{id}/published)
#   3. Unpublish when needed            (DELETE /entries/{id}/published)
#   4. Delete the draft permanently     (DELETE /entries/{id})
write_endpoints:

  # ── Entries ───────────────────────────────────────────────────────────────────

  # Create or update an entry by ID.
  # PUT /spaces/{space_id}/environments/{env}/entries/{entry_id}
  # Required headers:
  #   X-Contentful-Content-Type : the content type ID for new entries
  #   X-Contentful-Version      : current sys.version for updates (optimistic lock)
  # Body: { "fields": { "<field_id>": { "<locale>": <value> }, ... } }
  - name: upsert_entry
    description: "Create or update an entry by ID. Set X-Contentful-Content-Type header for new entries; set X-Contentful-Version for updates to prevent conflicts. Body: { fields: { <field_id>: { <locale>: <value> } } }."
    method: PUT
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "entries/{entry_id}"
    auth: bearer

  # Publish an entry (make it visible on the Delivery API).
  # PUT /spaces/{space_id}/environments/{env}/entries/{entry_id}/published
  # Required header: X-Contentful-Version : current sys.version
  # No request body required.
  - name: publish_entry
    description: "Publish an entry, making it available on the Delivery API. Requires X-Contentful-Version header set to the current sys.version."
    method: PUT
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "entries/{entry_id}/published"
    auth: bearer

  # Unpublish an entry (remove from Delivery API without deleting the draft).
  # DELETE /spaces/{space_id}/environments/{env}/entries/{entry_id}/published
  # Required header: X-Contentful-Version : current sys.version
  - name: unpublish_entry
    description: "Unpublish an entry, removing it from the Delivery API while preserving the draft. Requires X-Contentful-Version header."
    method: DELETE
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "entries/{entry_id}/published"
    auth: bearer

  # Permanently delete an entry draft. The entry must be unpublished first.
  # DELETE /spaces/{space_id}/environments/{env}/entries/{entry_id}
  - name: delete_entry
    description: "Permanently delete an entry draft. Unpublish the entry first; deleting a published entry returns 422."
    method: DELETE
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "entries/{entry_id}"
    auth: bearer

  # ── Assets ────────────────────────────────────────────────────────────────────

  # Create or update an asset metadata record (does not upload the binary).
  # PUT /spaces/{space_id}/environments/{env}/assets/{asset_id}
  # Required header: X-Contentful-Version for updates.
  # Body: { "fields": { "title": { "<locale>": "<string>" },
  #                     "description": { "<locale>": "<string>" },
  #                     "file": { "<locale>": { "contentType": "image/png",
  #                                             "fileName": "cat.png",
  #                                             "upload": "<binary_url_or_upload_id>" } } } }
  - name: upsert_asset
    description: "Create or update an asset's metadata (title, description, file reference). Use process_asset to trigger server-side file processing after upload. Requires X-Contentful-Version for updates."
    method: PUT
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "assets/{asset_id}"
    auth: bearer

  # Trigger server-side file processing for an uploaded asset.
  # PUT /spaces/{space_id}/environments/{env}/assets/{asset_id}/files/{locale}/process
  # Must be called after upsert_asset when a new file has been referenced.
  # No request body. The server downloads and processes the file at the upload URL.
  - name: process_asset
    description: "Trigger server-side processing for an asset's file in a specific locale. Call this after upsert_asset when referencing a new upload URL. No request body required."
    method: PUT
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "assets/{asset_id}/files/{locale}/process"
    auth: bearer

  # Publish an asset (make it visible on the Delivery API).
  # PUT /spaces/{space_id}/environments/{env}/assets/{asset_id}/published
  # Required header: X-Contentful-Version
  - name: publish_asset
    description: "Publish an asset, making it available on the Delivery API. Requires X-Contentful-Version header set to the current sys.version."
    method: PUT
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "assets/{asset_id}/published"
    auth: bearer

  # Unpublish an asset without deleting it.
  # DELETE /spaces/{space_id}/environments/{env}/assets/{asset_id}/published
  # Required header: X-Contentful-Version
  - name: unpublish_asset
    description: "Unpublish an asset, removing it from the Delivery API while preserving the record. Requires X-Contentful-Version header."
    method: DELETE
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "assets/{asset_id}/published"
    auth: bearer

  # Permanently delete an asset. Must be unpublished first.
  # DELETE /spaces/{space_id}/environments/{env}/assets/{asset_id}
  - name: delete_asset
    description: "Permanently delete an asset record and its associated file. Unpublish the asset first; deleting a published asset returns 422."
    method: DELETE
    base_url: "https://api.contentful.com/spaces/{space_id}/environments/{environment}/"
    path: "assets/{asset_id}"
    auth: bearer
