name: hubspot_marketing
description: "HubSpot Marketing APIs: marketing emails, forms, campaigns, landing pages, blog posts, marketing events, transactional email, and communication preferences. HubSpot CRM objects (contacts, companies, deals) are covered by the dlt verified source and are excluded here."

# HubSpot private app tokens are the recommended auth mechanism (supersedes API keys).
# Create one in: HubSpot account > Settings > Integrations > Private Apps.
# Grant scopes: content, marketing-email, transactional-email, forms, marketing-events.
credentials:
  - name: token
    flag: "--token"
    env: HUBSPOT_PRIVATE_APP_TOKEN
    prompt: "HubSpot private app token"
    secret: true

client:
  # All HubSpot APIs share the same base URL regardless of API group (/marketing/v3/,
  # /cms/v3/, /marketing/v3/transactional/, etc.). The group prefix is part of the path.
  base_url: "https://api.hubapi.com/"
  auth:
    # HubSpot v3+ APIs use Bearer token (private app token or OAuth access token).
    type: bearer
    token: "{token}"
  # HubSpot v3 list endpoints use cursor-based pagination.
  # Responses include a top-level "paging" object; the next-page cursor lives at
  # paging.next.after. Pass it as the "after" query parameter on the next request.
  # When paging.next is absent the current page is the last one.
  paginator:
    type: cursor
    cursor_path: "paging.next.after"
    cursor_param: "after"

resource_defaults:
  primary_key: id
  write_disposition: merge
  endpoint:
    # All HubSpot v3 list responses wrap the array in a "results" key.
    data_selector: "results"
    params:
      # Request maximum page size. HubSpot caps most list endpoints at 100-500;
      # 100 is a safe default that works across all endpoints below.
      limit: 100

resources:
  # ── Marketing Emails ────────────────────────────────────────────────────────
  # GET /marketing/v3/emails
  # Response: { results: [...], paging: { next: { after, link } }, total }
  # Required scope: marketing-email
  # Note: v1 marketing-emails API was sunset November 2025. Use v3 only.
  - name: emails
    endpoint:
      path: "marketing/v3/emails"

  # GET /marketing/v3/emails/statistics/list
  # Returns aggregate send/open/click stats per email.
  # Response: { results: [...], paging: { next: { after } }, total }
  # No extra params needed; cursor pagination applies.
  - name: email_statistics
    endpoint:
      path: "marketing/v3/emails/statistics/list"

  # ── Forms ────────────────────────────────────────────────────────────────────
  # GET /marketing/v3/forms
  # Response: { results: [...], paging: { next: { after } } }
  # Required scope: forms
  # Covers hubspot, captured, flow, and blog_comment form types.
  - name: forms
    endpoint:
      path: "marketing/v3/forms"

  # ── Campaigns ────────────────────────────────────────────────────────────────
  # GET /marketing/v3/campaigns
  # Response: { results: [...], paging: { next: { after } }, total }
  # Required scope: marketing-email (or content)
  - name: campaigns
    endpoint:
      path: "marketing/v3/campaigns"

  # ── Landing Pages ─────────────────────────────────────────────────────────────
  # GET /cms/v3/pages/landing-pages
  # Response: { results: [...], paging: { next: { after } }, total }
  # Required scope: content
  - name: landing_pages
    endpoint:
      path: "cms/v3/pages/landing-pages"

  # ── Blog Posts ────────────────────────────────────────────────────────────────
  # GET /cms/v3/blogs/posts
  # Response: { results: [...], paging: { next: { after } }, total }
  # Required scope: content
  - name: blog_posts
    endpoint:
      path: "cms/v3/blogs/posts"

  # ── Marketing Events ──────────────────────────────────────────────────────────
  # GET /marketing/v3/marketing-events/events/search
  # The primary list endpoint for marketing events (webinars, conferences, etc.).
  # Response: { results: [...] }  — no cursor pagination on the search endpoint.
  # Required scope: marketing-events (or crm.objects.marketing_events.read)
  - name: marketing_events
    endpoint:
      path: "marketing/v3/marketing-events/events/search"
      paginator:
        # Search endpoint does not support cursor pagination; disable it.
        type: none

  # ── Transactional SMTP Tokens ─────────────────────────────────────────────────
  # GET /marketing/v3/transactional/smtp-tokens
  # Lists SMTP API tokens used for sending transactional emails via SMTP relay.
  # Response: { results: [...], paging: { next: { after } } }
  # Required scope: transactional-email
  - name: transactional_smtp_tokens
    endpoint:
      path: "marketing/v3/transactional/smtp-tokens"

  # ── Communication Preference Definitions ──────────────────────────────────────
  # GET /communication-preferences/v3/definitions
  # Returns all subscription type definitions (email opt-in categories).
  # Response is a flat array of subscription type objects (no pagination wrapper).
  # Required scope: communication_preferences.read
  - name: subscription_definitions
    endpoint:
      path: "communication-preferences/v3/definitions"
      data_selector: "$"
      paginator:
        type: none

write_endpoints:
  # ── Marketing Emails ─────────────────────────────────────────────────────────
  # POST /marketing/v3/emails
  # Body: { name, subject, templatePath, ... }
  - name: create_email
    description: "Create a new marketing email."
    method: POST
    path: "marketing/v3/emails"

  # PATCH /marketing/v3/emails/{emailId}
  # Partially update email properties (name, subject, content settings, etc.).
  - name: update_email
    description: "Update an existing marketing email by ID."
    method: PATCH
    path: "marketing/v3/emails/{emailId}"

  # POST /marketing/v3/emails/{emailId}/publish
  # Publishes the email (sends immediately or schedules, depending on body).
  - name: publish_email
    description: "Publish or send a marketing email. Pass scheduledAt to schedule, omit for immediate send."
    method: POST
    path: "marketing/v3/emails/{emailId}/publish"

  # POST /marketing/v3/emails/{emailId}/unpublish
  # Reverts an email to draft / cancels a scheduled send.
  - name: unpublish_email
    description: "Unpublish or cancel a scheduled marketing email."
    method: POST
    path: "marketing/v3/emails/{emailId}/unpublish"

  # DELETE /marketing/v3/emails/{emailId}
  - name: delete_email
    description: "Permanently delete a marketing email by ID."
    method: DELETE
    path: "marketing/v3/emails/{emailId}"

  # POST /marketing/v3/emails/clone
  # Body: { id: "<emailId>", name: "<newName>" }
  - name: clone_email
    description: "Clone an existing marketing email. Provide source id and new name."
    method: POST
    path: "marketing/v3/emails/clone"

  # ── Forms ────────────────────────────────────────────────────────────────────
  # POST /marketing/v3/forms
  # Body: HubSpot form definition (formType, name, fieldGroups, etc.)
  - name: create_form
    description: "Create a new HubSpot form definition."
    method: POST
    path: "marketing/v3/forms"

  # PATCH /marketing/v3/forms/{formId}
  # Partially update an existing form's definition.
  - name: update_form
    description: "Partially update an existing form definition by form ID."
    method: PATCH
    path: "marketing/v3/forms/{formId}"

  # PUT /marketing/v3/forms/{formId}
  # Full replacement of a form definition.
  - name: replace_form
    description: "Fully replace a form definition by form ID (PUT replaces all fields)."
    method: PUT
    path: "marketing/v3/forms/{formId}"

  # DELETE /marketing/v3/forms/{formId}
  # Moves the form to archived state (soft-delete).
  - name: archive_form
    description: "Archive (soft-delete) a form definition by form ID."
    method: DELETE
    path: "marketing/v3/forms/{formId}"

  # ── Campaigns ────────────────────────────────────────────────────────────────
  # POST /marketing/v3/campaigns
  # Body: { name, startDate, endDate, ... }
  - name: create_campaign
    description: "Create a new marketing campaign."
    method: POST
    path: "marketing/v3/campaigns"

  # PATCH /marketing/v3/campaigns/{campaignGuid}
  # Partially update campaign metadata (name, dates, goal, etc.).
  - name: update_campaign
    description: "Update an existing campaign by GUID."
    method: PATCH
    path: "marketing/v3/campaigns/{campaignGuid}"

  # DELETE /marketing/v3/campaigns/{campaignGuid}
  - name: delete_campaign
    description: "Delete a campaign by GUID."
    method: DELETE
    path: "marketing/v3/campaigns/{campaignGuid}"

  # PUT /marketing/v3/campaigns/{campaignGuid}/assets/{assetType}/{assetId}
  # Associates a HubSpot asset (email, landing page, etc.) with a campaign.
  # assetType values: EMAIL, LANDING_PAGE, BLOG_POST, etc.
  - name: add_campaign_asset
    description: "Associate a HubSpot asset with a campaign. assetType: EMAIL | LANDING_PAGE | BLOG_POST | SITE_PAGE | CALL_TO_ACTION."
    method: PUT
    path: "marketing/v3/campaigns/{campaignGuid}/assets/{assetType}/{assetId}"

  # DELETE /marketing/v3/campaigns/{campaignGuid}/assets/{assetType}/{assetId}
  - name: remove_campaign_asset
    description: "Remove an asset association from a campaign."
    method: DELETE
    path: "marketing/v3/campaigns/{campaignGuid}/assets/{assetType}/{assetId}"

  # ── Landing Pages ─────────────────────────────────────────────────────────────
  # POST /cms/v3/pages/landing-pages
  # Body: { name, slug, templatePath, ... }
  - name: create_landing_page
    description: "Create a new landing page."
    method: POST
    path: "cms/v3/pages/landing-pages"

  # PATCH /cms/v3/pages/landing-pages/{objectId}
  - name: update_landing_page
    description: "Partially update an existing landing page."
    method: PATCH
    path: "cms/v3/pages/landing-pages/{objectId}"

  # DELETE /cms/v3/pages/landing-pages/{objectId}
  - name: delete_landing_page
    description: "Delete a landing page by ID."
    method: DELETE
    path: "cms/v3/pages/landing-pages/{objectId}"

  # POST /cms/v3/pages/landing-pages/{objectId}/draft/push-live
  # Pushes pending draft edits on a landing page to the live version.
  - name: publish_landing_page_draft
    description: "Push landing page draft edits live."
    method: POST
    path: "cms/v3/pages/landing-pages/{objectId}/draft/push-live"

  # POST /cms/v3/pages/landing-pages/schedule
  # Body: { id, publishDate } — schedules a future publish.
  - name: schedule_landing_page
    description: "Schedule a landing page to publish at a future date. Body: { id, publishDate (ISO 8601) }."
    method: POST
    path: "cms/v3/pages/landing-pages/schedule"

  # ── Blog Posts ────────────────────────────────────────────────────────────────
  # POST /cms/v3/blogs/posts
  # Body: { name, contentGroupId (blog ID), postBody, ... }
  - name: create_blog_post
    description: "Create a new blog post. contentGroupId is the blog ID."
    method: POST
    path: "cms/v3/blogs/posts"

  # PATCH /cms/v3/blogs/posts/{objectId}
  - name: update_blog_post
    description: "Update an existing blog post by ID."
    method: PATCH
    path: "cms/v3/blogs/posts/{objectId}"

  # DELETE /cms/v3/blogs/posts/{objectId}
  - name: delete_blog_post
    description: "Delete a blog post by ID."
    method: DELETE
    path: "cms/v3/blogs/posts/{objectId}"

  # POST /cms/v3/blogs/posts/{objectId}/draft/push-live
  - name: publish_blog_post_draft
    description: "Push blog post draft edits live."
    method: POST
    path: "cms/v3/blogs/posts/{objectId}/draft/push-live"

  # POST /cms/v3/blogs/posts/schedule
  # Body: { id, publishDate } — schedules future publishing.
  - name: schedule_blog_post
    description: "Schedule a blog post to publish at a future date. Body: { id, publishDate (ISO 8601) }."
    method: POST
    path: "cms/v3/blogs/posts/schedule"

  # ── Marketing Events ──────────────────────────────────────────────────────────
  # POST /marketing/v3/marketing-events/events
  # Body: { externalEventId, externalAccountId, eventName, eventType, startDateTime, endDateTime, ... }
  - name: create_marketing_event
    description: "Create a new marketing event (webinar, conference, etc.). externalEventId and externalAccountId are required."
    method: POST
    path: "marketing/v3/marketing-events/events"

  # PUT /marketing/v3/marketing-events/events/{externalEventId}
  # Creates the event if it doesn't exist, updates it if it does (upsert by externalEventId).
  - name: upsert_marketing_event
    description: "Create or update a marketing event by external event ID."
    method: PUT
    path: "marketing/v3/marketing-events/events/{externalEventId}"

  # PATCH /marketing/v3/marketing-events/events/{externalEventId}
  - name: update_marketing_event
    description: "Partially update a marketing event by external event ID."
    method: PATCH
    path: "marketing/v3/marketing-events/events/{externalEventId}"

  # POST /marketing/v3/marketing-events/events/{externalEventId}/cancel
  - name: cancel_marketing_event
    description: "Mark a marketing event as cancelled."
    method: POST
    path: "marketing/v3/marketing-events/events/{externalEventId}/cancel"

  # POST /marketing/v3/marketing-events/events/{externalEventId}/complete
  - name: complete_marketing_event
    description: "Mark a marketing event as completed."
    method: POST
    path: "marketing/v3/marketing-events/events/{externalEventId}/complete"

  # DELETE /marketing/v3/marketing-events/events/{externalEventId}
  - name: delete_marketing_event
    description: "Delete a marketing event by external event ID."
    method: DELETE
    path: "marketing/v3/marketing-events/events/{externalEventId}"

  # POST /marketing/v3/marketing-events/events/{externalEventId}/{subscriberState}/email-upsert
  # Records attendance/registration by contact email. subscriberState: REGISTERED, ATTENDED, CANCELLED.
  - name: record_event_attendance_by_email
    description: "Record a contact's participation in a marketing event by email address. subscriberState: REGISTERED | ATTENDED | CANCELLED."
    method: POST
    path: "marketing/v3/marketing-events/events/{externalEventId}/{subscriberState}/email-upsert"

  # POST /marketing/v3/marketing-events/events/{externalEventId}/{subscriberState}/upsert
  # Records attendance/registration by HubSpot contact ID.
  - name: record_event_attendance_by_contact
    description: "Record a contact's participation in a marketing event by HubSpot contact ID. subscriberState: REGISTERED | ATTENDED | CANCELLED."
    method: POST
    path: "marketing/v3/marketing-events/events/{externalEventId}/{subscriberState}/upsert"

  # ── Transactional Email ───────────────────────────────────────────────────────
  # POST /marketing/v3/transactional/single-email/send
  # Sends a single transactional email asynchronously using a template.
  # Body: { emailId (template ID), message: { to }, contactProperties, customProperties }
  - name: send_transactional_email
    description: "Send a single transactional email asynchronously. emailId is the HubSpot email template ID. Returns a job status ID."
    method: POST
    path: "marketing/v3/transactional/single-email/send"

  # POST /marketing/v4/email/single-send
  # Newer v4 variant for sending transactional emails.
  # Body: { emailId, message: { to }, contactProperties, customProperties }
  - name: send_transactional_email_v4
    description: "Send a single transactional email (v4 API). Preferred over v3 for new integrations."
    method: POST
    path: "marketing/v4/email/single-send"

  # POST /marketing/v3/transactional/smtp-tokens
  # Creates an SMTP API token for use with SMTP relay transactional sending.
  # Body: { createdBy, campaignName }
  - name: create_smtp_token
    description: "Create an SMTP API token for transactional email relay. Body: { createdBy, campaignName }."
    method: POST
    path: "marketing/v3/transactional/smtp-tokens"

  # DELETE /marketing/v3/transactional/smtp-tokens/{tokenId}
  - name: delete_smtp_token
    description: "Delete an SMTP API token by ID."
    method: DELETE
    path: "marketing/v3/transactional/smtp-tokens/{tokenId}"

  # ── Communication Preferences ─────────────────────────────────────────────────
  # POST /communication-preferences/v3/subscribe
  # Opts a contact into a subscription type.
  # Body: { emailAddress, subscriptionId, legalBasis, legalBasisExplanation }
  - name: subscribe_contact
    description: "Opt a contact into a communication subscription type by email address."
    method: POST
    path: "communication-preferences/v3/subscribe"

  # POST /communication-preferences/v3/unsubscribe
  # Opts a contact out of a subscription type.
  # Body: { emailAddress, subscriptionId, legalBasis, legalBasisExplanation }
  - name: unsubscribe_contact
    description: "Opt a contact out of a communication subscription type by email address."
    method: POST
    path: "communication-preferences/v3/unsubscribe"
