name: netlify
description: "Netlify (sites, deploys, forms, submissions, hooks, dns_zones, build_hooks, accounts)"

credentials:
  - name: token
    flag: "--token"
    env: NETLIFY_TOKEN
    prompt: "Netlify personal access token"
    secret: true

client:
  base_url: "https://api.netlify.com/api/v1/"
  auth:
    type: bearer
    token: "{token}"
  # Netlify uses page-number pagination with ?page and ?per_page query params.
  # Responses return bare JSON arrays. Pagination info is conveyed via the
  # Link response header (rel="next", rel="last", rel="prev").
  # Default page size is 100; max is also 100.
  paginator:
    type: page_number
    page_param: "page"
    page_size_param: "per_page"
    page_size: 100
    base_page: 1
    next_page_header: "link"

resource_defaults:
  primary_key: id
  write_disposition: merge
  # Netlify returns bare JSON arrays — no data_selector needed.

resources:
  # ── Sites ────────────────────────────────────────────────────────────────
  # All sites the authenticated user has access to.
  # Supports ?filter=all|owner|guest and ?name for search.
  # Sorted by updated_at descending by default.
  - name: sites
    endpoint:
      path: "sites"
      params:
        filter: all
    incremental:
      cursor_path: updated_at
      param: since
      initial_value: "2024-01-01T00:00:00Z"

  # ── Deploys (nested under sites) ─────────────────────────────────────────
  # Lists all deploys for a given site. Requires {site_id} path variable.
  # Returns deploy records including state, branch, sha, created_at, etc.
  - name: deploys
    endpoint:
      path: "sites/{site_id}/deploys"
    incremental:
      cursor_path: created_at
      initial_value: "2024-01-01T00:00:00Z"

  # ── Forms ─────────────────────────────────────────────────────────────────
  # Lists all forms for a given site. Requires {site_id} path variable.
  # Returns form records including name, submission_count, fields, etc.
  # No date-filter params available on this endpoint.
  - name: forms
    endpoint:
      path: "sites/{site_id}/forms"

  # ── Submissions ───────────────────────────────────────────────────────────
  # Lists all form submissions for a given site. Requires {site_id} path variable.
  # Alternatively, submissions can be fetched per-form via forms/{form_id}/submissions.
  # Returns submission records including data, created_at, etc.
  - name: submissions
    endpoint:
      path: "sites/{site_id}/submissions"
    incremental:
      cursor_path: created_at
      initial_value: "2024-01-01T00:00:00Z"

  # ── Hooks (notification webhooks) ─────────────────────────────────────────
  # Lists all outgoing notification hooks configured for a given site.
  # Requires {site_id} path variable.
  # Returns hook records including type, event, data (url, format, etc.).
  # No date-filter params available on this endpoint.
  - name: hooks
    endpoint:
      path: "sites/{site_id}/hooks"

  # ── DNS Zones ─────────────────────────────────────────────────────────────
  # Lists all DNS zones for the authenticated account.
  # Returns zone records including name, records, account_id, etc.
  # No date-filter params available on this endpoint.
  - name: dns_zones
    endpoint:
      path: "dns_zones"

  # ── Build Hooks ───────────────────────────────────────────────────────────
  # Lists all build hooks for a given site. Requires {site_id} path variable.
  # Build hooks allow triggering deploys via an HTTP POST to a unique URL.
  # Returns hook records including title, branch, url, etc.
  # No date-filter params available on this endpoint.
  - name: build_hooks
    endpoint:
      path: "sites/{site_id}/build_hooks"

  # ── Accounts ──────────────────────────────────────────────────────────────
  # Lists all accounts (teams) the authenticated user belongs to.
  # Returns account records including name, slug, type, capabilities, etc.
  # No date-filter or pagination params documented for this endpoint.
  - name: accounts
    endpoint:
      path: "accounts"

write_endpoints:
  # ── Sites ─────────────────────────────────────────────────────────────────

  # Create a new site. Body can include name, custom_domain, repo config, etc.
  - name: create_site
    description: "Create a new Netlify site"
    method: POST
    path: "sites"
    body:
      optional:
        - name
        - custom_domain
        - password
        - force_ssl
        - repo
        - build_settings
        - processing_settings

  # Update an existing site's configuration.
  # Path params: site_id
  - name: update_site
    description: "Update an existing site's configuration"
    method: PUT
    path: "sites/{site_id}"
    body:
      optional:
        - name
        - custom_domain
        - password
        - force_ssl
        - repo
        - build_settings
        - processing_settings

  # ── Deploys ───────────────────────────────────────────────────────────────

  # Trigger a new deploy for a site. Requires {site_id} path variable.
  # Body may include a title for the deploy; actual file uploads handled separately.
  - name: trigger_deploy
    description: "Trigger a new deploy for a site"
    method: POST
    path: "sites/{site_id}/deploys"
    body:
      optional:
        - title
        - branch
        - clear_cache

  # Cancel an in-progress deploy. Requires {site_id} and {deploy_id}.
  # No request body needed; the action is encoded in the path.
  - name: cancel_deploy
    description: "Cancel an in-progress deploy"
    method: POST
    path: "sites/{site_id}/deploys/{deploy_id}/cancel"

  # Restore a previous deploy, making it the live deploy for the site.
  # Requires {site_id} and {deploy_id}. No request body needed.
  - name: restore_deploy
    description: "Restore a previous deploy to make it the current live deploy"
    method: POST
    path: "sites/{site_id}/deploys/{deploy_id}/restore"

  # ── Hooks ─────────────────────────────────────────────────────────────────

  # Create a new notification hook for a site. Requires {site_id}.
  # Required body fields: type (e.g. "url"), event (e.g. "deploy_created"),
  # and data (object with hook-type-specific fields such as url, format).
  - name: create_hook
    description: "Create a new notification webhook for a site"
    method: POST
    path: "sites/{site_id}/hooks"
    body:
      required:
        - type
        - event
        - data
      optional:
        - disabled

  # Update an existing notification hook. Requires {hook_id}.
  - name: update_hook
    description: "Update an existing notification webhook"
    method: PUT
    path: "hooks/{hook_id}"
    body:
      optional:
        - event
        - data
        - disabled

  # Delete a notification hook permanently. Requires {hook_id}.
  - name: delete_hook
    description: "Delete a notification webhook"
    method: DELETE
    path: "hooks/{hook_id}"
