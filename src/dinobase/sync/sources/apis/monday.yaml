# NOTE: Monday.com uses a GraphQL API, not REST. This file uses type: graphql so
# the registry dispatches to dinobase.sync.sources.graphql.graphql_source
# instead of dlt's rest_api_source. The structure below maps GraphQL concepts
# onto the Dinobase YAML spec as closely as possible, with annotations where
# GraphQL and REST diverge.
#
# GRAPHQL vs REST MAPPING NOTES:
#   - There is a single endpoint: POST https://api.monday.com/v2
#   - Each "resource" below POSTs a different GraphQL query to that endpoint.
#   - "path" would always be "v2"; "method" is always POST.
#   - Most top-level queries use page-based pagination (page + limit args).
#   - Items inside boards use cursor-based pagination via items_page / next_items_page.
#   - Write operations (mutations) also POST to /v2; the mutation string
#     lives in the request body, not the URL.
#
# AUTH NOTE:
#   Monday.com API tokens are passed directly in the Authorization header with
#   NO prefix (no "Bearer", no "Token"):
#     Authorization: <API_KEY>
#   auth_prefix is set to "" to match this requirement.

type: graphql

name: monday
description: "Monday.com (boards, items, updates, users, teams, groups, workspaces, columns)"

# ── Credentials ─────────────────────────────────────────────────────────────────
auth:
  field: api_key
  cli_flag: "--api-key"
  env_var: MONDAY_API_KEY
  prompt: "Monday.com API token"
  secret: true

# No prefix — Monday expects the raw token in the Authorization header.
auth_prefix: ""

# ── Endpoint ─────────────────────────────────────────────────────────────────────
# All queries and mutations go to this single GraphQL endpoint.
endpoint: "https://api.monday.com/v2"

# ── Resources (Read Queries) ──────────────────────────────────────────────────────
# Each resource POSTs one GraphQL query. graphql.py:
#   data_path   – dot-separated path to the array in the JSON response
#   cursor_path – dot-separated path to the pageInfo object (Relay-style cursors only)
#   primary_key – field used as the unique row identifier
#
# Monday pagination notes:
#   - boards, users, workspaces: page-based (page + limit args, increment page until
#     fewer than `limit` rows are returned).
#   - teams: no pagination (small, bounded set).
#   - items: cursor-based via `items_page` nested in `boards`, then `next_items_page`
#     at root level for subsequent pages.
#   - updates: page-based (page + limit args).

resources:

  # ── Workspaces ──────────────────────────────────────────────────────────────────
  # Workspaces are the top-level organisational containers. Fetch these first so
  # board records can be cross-referenced to a workspace_id.
  - name: workspaces
    query: |
      query($page: Int) {
        workspaces(limit: 100, page: $page) {
          id
          name
          description
          kind
          state
          created_at
        }
      }
    data_path: "data.workspaces"
    primary_key: id

  # ── Boards ───────────────────────────────────────────────────────────────────────
  # All boards visible to the authenticated user. Each board also pulls its
  # columns and groups inline to avoid extra round-trips.
  # Columns and groups are nested sub-objects; they are not separate paginated
  # connections on the Monday API, so they are included here rather than as
  # separate resources.
  - name: boards
    query: |
      query($page: Int) {
        boards(limit: 50, page: $page, state: active) {
          id
          name
          description
          state
          board_kind
          board_folder_id
          workspace_id
          permissions
          url
          updated_at
          items_count
          columns {
            id
            title
            type
            description
            archived
            width
          }
          groups {
            id
            title
            color
            position
            archived
            deleted
          }
          owner { id name email }
          creator { id name email }
        }
      }
    data_path: "data.boards"
    primary_key: id

  # ── Items ─────────────────────────────────────────────────────────────────────────
  # Items live inside boards and groups. Monday uses cursor-based pagination for
  # items via the `items_page` field on `boards`. The initial page is requested
  # with `items_page(limit: 100)` nested under each board; subsequent pages use
  # the root-level `next_items_page(limit: 100, cursor: $cursor)` query with the
  # cursor returned by the previous response.
  #
  # This resource fetches the first page of items across all boards. The loader
  # must follow the cursor pattern with next_items_page for boards that have
  # more than 100 items.
  #
  # column_values: each entry has id (column id), text (human-readable), and
  # value (raw JSON string). Requesting `text` avoids needing to decode type-
  # specific value JSON for most use cases.
  - name: items
    query: |
      query($page: Int) {
        boards(limit: 50, page: $page, state: active) {
          id
          items_page(limit: 100) {
            cursor
            items {
              id
              name
              state
              url
              relative_link
              creator_id
              created_at
              updated_at
              board { id name }
              group { id title }
              creator { id name email }
              column_values {
                id
                text
                type
                value
              }
            }
          }
        }
      }
    # data_path points to the boards array; the loader must iterate boards and
    # then extract items from each board's items_page.items array.
    data_path: "data.boards"
    primary_key: id

  # ── Updates (item activity log / comments) ────────────────────────────────────────
  # Updates are the threaded comments on items. The top-level `updates` query
  # returns updates across all items ordered by creation date, newest first.
  # Pagination is page-based (page + limit).
  - name: updates
    query: |
      query($page: Int) {
        updates(limit: 100, page: $page) {
          id
          body
          text_body
          creator_id
          item_id
          created_at
          edited_at
          creator { id name email }
          item { id name }
        }
      }
    data_path: "data.updates"
    primary_key: id

  # ── Users ─────────────────────────────────────────────────────────────────────────
  # All users in the account. Monday recommends a limit of 50 for optimal
  # performance; use page-based pagination to retrieve all users.
  - name: users
    query: |
      query($page: Int) {
        users(limit: 100, page: $page, kind: all) {
          id
          name
          email
          title
          phone
          mobile_phone
          location
          time_zone_identifier
          current_language
          photo_thumb
          photo_small
          photo_original
          url
          is_admin
          is_guest
          is_pending
          is_view_only
          enabled
          join_date
          created_at
          last_activity
          account { id name }
        }
      }
    data_path: "data.users"
    primary_key: id

  # ── Teams ─────────────────────────────────────────────────────────────────────────
  # Teams are small bounded sets (no pagination needed). The `teams` query has no
  # limit/page arguments and returns all teams in one response.
  - name: teams
    query: |
      query {
        teams {
          id
          name
          picture_url
          owners { id name email }
          users { id name email }
        }
      }
    data_path: "data.teams"
    primary_key: id

# ── Write Endpoints (Mutations) ────────────────────────────────────────────────────
# GraphQL mutations don't map cleanly to REST write endpoints:
#   - All mutations POST to the same URL (https://api.monday.com/v2).
#   - The operation name and inputs live in the request body, not the URL.
#   - The HTTP method is always POST regardless of the mutation type.
#
# These entries document the available mutations in the closest REST equivalent.
# Callers must build the full {"query": "<mutation>", "variables": {...}} body.
# The write_client sends it as-is to POST https://api.monday.com/v2 with the
# Authorization header set to the api_key credential (no prefix).

write_endpoints:

  # ── Items ─────────────────────────────────────────────────────────────────────────

  - name: create_item
    description: "Create a new item on a board (required: board_id, item_name)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation CreateItem($boardId: ID!, $groupId: String, $itemName: String!, $columnValues: JSON) { create_item(board_id: $boardId, group_id: $groupId, item_name: $itemName, column_values: $columnValues) { id name board { id } group { id } } }",
    #   "variables": {
    #     "boardId": "1234567890",
    #     "groupId": "group_one",
    #     "itemName": "New item",
    #     "columnValues": "{\"status\": {\"label\": \"Done\"}, \"date4\": {\"date\": \"2026-01-01\"}}"
    #   }
    # }

  - name: update_item_name
    description: "Rename an item (required: board_id, item_id, item_name)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation RenameItem($boardId: ID!, $itemId: ID!, $itemName: String!) { change_item_value(board_id: $boardId, item_id: $itemId, column_id: \"name\", value: $itemName) { id name } }",
    #   "variables": { "boardId": "1234567890", "itemId": "9876543210", "itemName": "Updated name" }
    # }

  - name: change_column_value
    description: "Set a single column value on an item (required: board_id, item_id, column_id, value)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation ChangeColumnValue($boardId: ID!, $itemId: ID!, $columnId: String!, $value: JSON!) { change_column_value(board_id: $boardId, item_id: $itemId, column_id: $columnId, value: $value) { id name column_values { id text value } } }",
    #   "variables": {
    #     "boardId": "1234567890",
    #     "itemId": "9876543210",
    #     "columnId": "status",
    #     "value": "{\"label\": \"Done\"}"
    #   }
    # }

  - name: change_multiple_column_values
    description: "Set multiple column values on an item in one call (required: board_id, item_id, column_values)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation ChangeMultipleColumnValues($boardId: ID!, $itemId: ID!, $columnValues: JSON!) { change_multiple_column_values(board_id: $boardId, item_id: $itemId, column_values: $columnValues) { id name column_values { id text value } } }",
    #   "variables": {
    #     "boardId": "1234567890",
    #     "itemId": "9876543210",
    #     "columnValues": "{\"status\": {\"label\": \"In Progress\"}, \"date4\": {\"date\": \"2026-03-01\"}, \"text\": \"Some notes\"}"
    #   }
    # }

  - name: delete_item
    description: "Permanently delete an item (required: item_id)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation DeleteItem($itemId: ID!) { delete_item(item_id: $itemId) { id } }",
    #   "variables": { "itemId": "9876543210" }
    # }

  - name: archive_item
    description: "Archive an item (soft-delete, required: item_id)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation ArchiveItem($itemId: ID!) { archive_item(item_id: $itemId) { id state } }",
    #   "variables": { "itemId": "9876543210" }
    # }

  # ── Updates ───────────────────────────────────────────────────────────────────────

  - name: create_update
    description: "Post a comment/update to an item (required: item_id, body)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation CreateUpdate($itemId: ID!, $body: String!) { create_update(item_id: $itemId, body: $body) { id body created_at item_id creator { id name } } }",
    #   "variables": { "itemId": "9876543210", "body": "Status updated — ready for review." }
    # }

  - name: delete_update
    description: "Delete an update/comment (required: id)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation DeleteUpdate($id: ID!) { delete_update(id: $id) { id } }",
    #   "variables": { "id": "1122334455" }
    # }

  # ── Boards ────────────────────────────────────────────────────────────────────────

  - name: create_board
    description: "Create a new board (required: board_name, board_kind)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
