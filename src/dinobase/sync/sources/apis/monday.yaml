    #   "query": "mutation ArchiveBoard($boardId: ID!) { archive_board(board_id: $boardId) { id state } }",
    #   "variables": { "boardId": "1234567890" }
    # }

  # ── Groups ────────────────────────────────────────────────────────────────────────

  - name: create_group
    description: "Create a new group on a board (required: board_id, group_name)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
    # {
    #   "query": "mutation CreateGroup($boardId: ID!, $groupName: String!) { create_group(board_id: $boardId, group_name: $groupName) { id title } }",
    #   "variables": { "boardId": "1234567890", "groupName": "Sprint 42" }
    # }

  - name: delete_group
    description: "Delete a group from a board (required: board_id, group_id)"
    method: POST
    base_url: "https://api.monday.com/"
