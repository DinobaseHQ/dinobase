    #   "query": "mutation CreateBoard($name: String!, $kind: BoardKind!, $workspaceId: ID, $folderId: Int) { create_board(board_name: $name, board_kind: $kind, workspace_id: $workspaceId, folder_id: $folderId) { id name board_kind workspace_id } }",
    #   "variables": { "name": "Q1 Planning", "kind": "public", "workspaceId": "555666777" }
    # }

  - name: archive_board
    description: "Archive a board (required: board_id)"
    method: POST
    base_url: "https://api.monday.com/"
    path: v2
    auth: bearer
    # Request body:
