name: todoist
description: "Todoist (tasks, projects, sections, labels, comments)"

credentials:
  - name: api_token
    flag: "--token"
    env: TODOIST_API_TOKEN
    prompt: "Todoist API token (Settings → Integrations → Developer)"
    secret: true

client:
  base_url: "https://api.todoist.com/api/v1/"
  auth:
    type: bearer
    token: "{api_token}"
  # Todoist REST API v2 uses cursor-based pagination on all list endpoints.
  # Responses are enveloped as {"results": [...], "next_cursor": "<opaque string>" | null}.
  # Pass the next_cursor value as the ?cursor= query parameter on the next request.
  # Pagination stops when next_cursor is null/absent in the response.
  # Default page size is 50; maximum is 200 (via ?limit=).
  paginator:
    type: cursor
    cursor_path: "next_cursor"
    cursor_param: "cursor"

resource_defaults:
  primary_key: id
  write_disposition: merge
  endpoint:
    data_selector: results

resources:
  # ── Projects ──────────────────────────────────────────────────────────────────
  # GET /api/v1/projects → PaginatedList[PersonalProjectSyncView | WorkspaceProjectSyncView]
  # Returns all active personal and workspace projects for the authenticated user.
  # Response fields: id, name, description, color, parent_id, child_order,
  #   is_shared, is_favorite, is_archived, is_deleted, is_inbox_project (inbox_project),
  #   view_style, creator_uid, created_at, updated_at, default_order, public_key,
  #   can_assign_tasks, is_collapsed, is_frozen.
  # No incremental filter param is available on this endpoint; full sync is used.
  - name: projects
    endpoint:
      path: "projects"
      params:
        limit: 200

  # ── Sections ──────────────────────────────────────────────────────────────────
  # GET /api/v1/sections → PaginatedList[SectionSyncView]
  # Returns all active sections. Can be filtered by project_id.
  # Response fields: id, user_id, project_id, name, section_order,
  #   is_collapsed, is_archived, is_deleted, added_at, updated_at, archived_at.
  # No incremental filter param is available; full sync is used.
  - name: sections
    endpoint:
      path: "sections"
      params:
        limit: 200

  # ── Labels ────────────────────────────────────────────────────────────────────
  # GET /api/v1/labels → PaginatedList[LabelRestView]
  # Returns all personal labels for the authenticated user.
  # Response fields: id, name, color, order, is_favorite.
  # Labels are a small, infrequently-changed resource; full sync is appropriate.
  - name: labels
    endpoint:
      path: "labels"
      params:
        limit: 200

  # ── Tasks ─────────────────────────────────────────────────────────────────────
  # GET /api/v1/tasks → PaginatedList[ItemSyncView]
  # Returns all active (non-completed) tasks for the user.
  # Response fields: id, user_id, project_id, section_id, parent_id, content,
  #   description, labels, priority, due, duration, deadline, checked,
  #   is_deleted, is_collapsed, added_at, updated_at, completed_at,
  #   added_by_uid, assigned_by_uid, responsible_uid, completed_by_uid,
  #   child_order, day_order, note_count.
  # Incremental sync: the API does not expose an updated_since query filter on the
  # active-tasks list endpoint. Full sync is performed on each run and dlt's merge
  # write_disposition deduplicates using the primary key. For workloads where
  # updated_at-based filtering is critical, switch to the Sync API instead.
  - name: tasks
    endpoint:
      path: "tasks"
      params:
        limit: 200

  # ── Comments ──────────────────────────────────────────────────────────────────
  # GET /api/v1/comments → PaginatedList[NoteSyncView]
  # Returns comments. Either task_id or project_id MUST be provided as a filter
  # per the API contract; without one the endpoint returns an error.
  # For a full sync across all comments, omit both filters — the API will return
  # an error and the connector falls back to sync-API coverage for comments.
  # Response fields: id, posted_uid, content, file_attachment, uids_to_notify,
  #   is_deleted, posted_at, reactions.
  # Note: the list endpoint requires a task_id or project_id filter. When running
  # without a specific project/task scope the Sync API covers comment data.
  - name: comments
    endpoint:
      path: "comments"
      params:
        limit: 200

write_endpoints:
  # ── Tasks ─────────────────────────────────────────────────────────────────────

  # Create a new task.
  # Path: POST /api/v1/tasks
  # Required body fields: content (string, min 1 char)
  # Optional body fields: description, project_id, section_id, parent_id,
  #   order, labels (array of label names), priority (1–4, 4 = very urgent),
  #   assignee_id, due_string, due_date, due_datetime, due_lang, duration,
  #   duration_unit ("minute" | "day"), deadline_date, deadline_lang.
  # Returns: ItemSyncView (the created task object).
  - name: create_task
    description: "Create a new task (required: content)"
    method: POST
    path: "tasks"
    auth: bearer

  # Update an existing task by ID.
  # Path: POST /api/v1/tasks/{task_id}
  # Note: the API uses POST (not PATCH/PUT) for updates.
  # Required path param: task_id
  # Optional body fields: content, description, labels, priority, assignee_id,
  #   due_string, due_date, due_datetime, due_lang, duration, duration_unit,
  #   deadline_date, deadline_lang.
  # Returns: ItemSyncView (the updated task object).
  - name: update_task
    description: "Update an existing task by task_id"
    method: POST
    path: "tasks/{task_id}"
    auth: bearer

  # Delete (permanently remove) a task by ID.
  # Path: DELETE /api/v1/tasks/{task_id}
  # Required path param: task_id
  # Returns: empty JSON object {} on success.
  - name: delete_task
    description: "Permanently delete a task by task_id"
    method: DELETE
    path: "tasks/{task_id}"
    auth: bearer

  # ── Projects ──────────────────────────────────────────────────────────────────

  # Create a new project.
  # Path: POST /api/v1/projects
  # Required body fields: name (string)
  # Optional body fields: description, parent_id, color (named color string or
  #   legacy integer), is_favorite, view_style ("list" | "board" | "calendar"),
  #   workspace_id (integer; creates a workspace project when provided).
  # Returns: PersonalProjectSyncView or WorkspaceProjectSyncView.
  - name: create_project
    description: "Create a new project (required: name)"
    method: POST
    path: "projects"
    auth: bearer

  # Update an existing project by ID.
  # Path: POST /api/v1/projects/{project_id}
  # Note: the API uses POST (not PATCH/PUT) for updates.
  # Required path param: project_id
  # Optional body fields: name, description, color, is_favorite, view_style.
  # Returns: PersonalProjectSyncView or WorkspaceProjectSyncView.
  - name: update_project
    description: "Update an existing project by project_id"
    method: POST
    path: "projects/{project_id}"
    auth: bearer

  # Delete a project by ID.
  # Path: DELETE /api/v1/projects/{project_id}
  # Required path param: project_id
  # Note: deleting a project also deletes all tasks, sections, and comments within it.
  # Returns: empty JSON object {} on success.
  - name: delete_project
    description: "Delete a project and all its content by project_id"
    method: DELETE
    path: "projects/{project_id}"
    auth: bearer

  # ── Comments ──────────────────────────────────────────────────────────────────

  # Create a comment on a task or project.
  # Path: POST /api/v1/comments
  # Required body fields: content (string, max 15 000 chars)
  # One of the following must also be provided:
  #   task_id (string) – attach the comment to a task
  #   project_id (string) – attach the comment to a project
  # Optional body fields: attachment (object with resource_type, file_url,
  #   file_name, file_type), uids_to_notify (array of integer user IDs).
  # Returns: NoteSyncView (the created comment object).
  - name: create_comment
    description: "Create a comment on a task or project (required: content + task_id or project_id)"
    method: POST
    path: "comments"
    auth: bearer

  # Update an existing comment.
  # Path: POST /api/v1/comments/{comment_id}
  # Note: the API uses POST (not PATCH/PUT) for updates.
  # Required path param: comment_id
  # Required body fields: content (string, max 15 000 chars)
  # Returns: NoteSyncView or null.
  - name: update_comment
    description: "Update the content of an existing comment by comment_id"
    method: POST
    path: "comments/{comment_id}"
    auth: bearer

  # Delete a comment by ID.
  # Path: DELETE /api/v1/comments/{comment_id}
  # Required path param: comment_id
  # Returns: empty JSON object {} on success.
  - name: delete_comment
    description: "Delete a comment by comment_id"
    method: DELETE
    path: "comments/{comment_id}"
    auth: bearer
