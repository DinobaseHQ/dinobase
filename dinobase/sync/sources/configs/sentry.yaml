name: sentry
description: "Sentry (issues, events, projects, releases, teams)"
oauth: true
credentials:
  - name: auth_token
    flag: "--token"
    env: SENTRY_AUTH_TOKEN
    prompt: "Sentry auth token"
    secret: true
  - name: organization
    flag: "--org"
    env: SENTRY_ORG
    prompt: "Sentry organization slug"
    secret: false

client:
  base_url: "https://sentry.io/api/0/"
  auth:
    type: bearer
    token: "{auth_token}"
  # Sentry uses Link header pagination with cursor-based navigation.
  # The Link header contains rel="next" with results="true"/"false".
  # Pagination stops when results="false" on the next link.
  paginator:
    type: header_link
    links_next_key: "next"

resource_defaults:
  primary_key: id
  write_disposition: merge
  # Sentry returns bare JSON arrays — no data_selector needed.

resources:
  # ── Organizations ────────────────────────────────────────────────────
  # Lists all organizations the authenticated user belongs to.
  - name: organizations
    endpoint:
      path: "organizations/"

  # ── Projects ─────────────────────────────────────────────────────────
  # Lists all projects for the given organization.
  # Path: GET /api/0/organizations/{organization_id_or_slug}/projects/
  - name: projects
    endpoint:
      path: "organizations/{organization}/projects/"

  # ── Issues ───────────────────────────────────────────────────────────
  # Lists issues (error groups) for the organization.
  # Path: GET /api/0/organizations/{organization_id_or_slug}/issues/
  # Sorted by lastSeen descending (sort=date) for incremental loading.
  # The `since` param filters to issues last seen after the given Unix timestamp.
  - name: issues
    endpoint:
      path: "organizations/{organization}/issues/"
      params:
        sort: date
        limit: 100
    incremental:
      cursor_path: lastSeen
      initial_value: "1970-01-01T00:00:00Z"

  # ── Events ───────────────────────────────────────────────────────────
  # Lists error events for the organization (discover endpoint).
  # Path: GET /api/0/organizations/{organization_id_or_slug}/events/
  # Returns raw events; primary_key is the eventID string field.
  - name: events
    primary_key: eventID
    endpoint:
      path: "organizations/{organization}/events/"
      params:
        limit: 100

  # ── Releases ─────────────────────────────────────────────────────────
  # Lists all releases for the organization.
  # Path: GET /api/0/organizations/{organization_id_or_slug}/releases/
  - name: releases
    primary_key: version
    endpoint:
      path: "organizations/{organization}/releases/"

  # ── Teams ────────────────────────────────────────────────────────────
  # Lists all teams within the organization.
  # Path: GET /api/0/organizations/{organization_id_or_slug}/teams/
  - name: teams
    endpoint:
      path: "organizations/{organization}/teams/"

  # ── Members ──────────────────────────────────────────────────────────
  # Lists all members of the organization.
  # Path: GET /api/0/organizations/{organization_id_or_slug}/members/
  - name: members
    endpoint:
      path: "organizations/{organization}/members/"

write_endpoints:
  # ── Update Issue ─────────────────────────────────────────────────────
  # Update status, assignee, and other fields on a single issue.
  # Path: PUT /api/0/organizations/{organization_id_or_slug}/issues/{issue_id}/
  # Requires event:write scope.
  # Path params: organization, issue_id
  # Body fields: status (resolved|resolvedInNextRelease|unresolved|ignored),
  #              assignedTo (username or actor id), hasSeen, isBookmarked,
  #              isSubscribed, isPublic, statusDetails
  - name: update_issue
    description: "Update an issue's status, assignee, or other fields"
    method: PUT
    base_url: "https://sentry.io/api/0/"
    path: "organizations/{organization}/issues/{issue_id}/"
    auth: bearer

  # ── Create Release ───────────────────────────────────────────────────
  # Create a new release for the organization.
  # Path: POST /api/0/organizations/{organization_id_or_slug}/releases/
  # Requires project:releases scope.
  # Body fields (required): version (string), projects (array of slugs)
  # Body fields (optional): ref, url, dateReleased, commits, refs
  - name: create_release
    description: "Create a new release for the organization"
    method: POST
    base_url: "https://sentry.io/api/0/"
    path: "organizations/{organization}/releases/"
    auth: bearer
    write: true

  # ── Update Release ───────────────────────────────────────────────────
  # Update metadata on an existing release.
  # Path: PUT /api/0/organizations/{organization_id_or_slug}/releases/{version}/
  # Requires project:releases scope.
  # Path params: organization, version
  # Body fields: ref, url, dateReleased, commits, refs
  - name: update_release
    description: "Update metadata on an existing release"
    method: PUT
    base_url: "https://sentry.io/api/0/"
    path: "organizations/{organization}/releases/{version}/"
    auth: bearer
    write: true
