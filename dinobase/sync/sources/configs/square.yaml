name: square
description: "Square (payments, orders, customers, invoices, catalog, locations, team members)"
oauth: true
credentials:
  - name: access_token
    flag: "--token"
    env: SQUARE_ACCESS_TOKEN
    prompt: "Square access token"
    secret: true

client:
  base_url: "https://connect.squareup.com/v2/"
  auth:
    type: bearer
    token: "{access_token}"
  # Square uses cursor-based pagination. Responses include a top-level "cursor"
  # field when more pages exist; pass it as ?cursor= on the next request.
  paginator:
    type: cursor
    cursor_path: "cursor"
    cursor_param: "cursor"

resource_defaults:
  primary_key: id
  write_disposition: merge

resources:

  # ── Payments ────────────────────────────────────────────────────────────────
  # GET /v2/payments — max 100/page, supports begin_time/end_time filtering.
  # Incremental via begin_time (RFC 3339). Response key: payments.
  - name: payments
    endpoint:
      path: "payments"
      data_selector: "payments"
      params:
        sort_order: "ASC"
    incremental:
      cursor_path: "updated_at"
      initial_value: "2020-01-01T00:00:00Z"

  # ── Refunds ─────────────────────────────────────────────────────────────────
  # GET /v2/refunds — max 100/page, supports begin_time/end_time.
  # Incremental via updated_at. Response key: refunds.
  - name: refunds
    endpoint:
      path: "refunds"
      data_selector: "refunds"
      params:
        sort_order: "ASC"
    incremental:
      cursor_path: "updated_at"
      initial_value: "2020-01-01T00:00:00Z"

  # ── Orders ──────────────────────────────────────────────────────────────────
  # POST /v2/orders/search — list operation uses POST with request body.
  # Cursor and limit go in the body. Default limit 500, max 1000.
  # Response keys: orders (full objects) or order_entries (stubs).
  # return_entries: false to get full Order objects.
  - name: orders
    endpoint:
      path: "orders/search"
      method: POST
      data_selector: "orders"
      json:
        return_entries: false
        limit: 500
        query:
          sort:
            sort_field: "UPDATED_AT"
            sort_order: "ASC"
    incremental:
      cursor_path: "updated_at"
      initial_value: "2020-01-01T00:00:00Z"

  # ── Customers ───────────────────────────────────────────────────────────────
  # GET /v2/customers — standard cursor pagination, max 100/page.
  # Square also offers POST /v2/customers/search for richer filtering.
  # Using GET list here; search is available as a write/query endpoint.
  # Response key: customers.
  - name: customers
    endpoint:
      path: "customers"
      data_selector: "customers"
      params:
        sort_field: "CREATED_AT"
        sort_order: "ASC"

  # ── Invoices ─────────────────────────────────────────────────────────────────
  # GET /v2/invoices — requires location_id query param; max 200/page.
  # No native updated_at filter — full replace per sync is safest.
  # Response key: invoices.
  - name: invoices
    endpoint:
      path: "invoices"
      data_selector: "invoices"
    write_disposition: replace

  # ── Catalog Objects ──────────────────────────────────────────────────────────
  # GET /v2/catalog/list — up to 100 objects/page, supports type filtering.
  # Response key: objects. Cursor at top level.
  - name: catalog_objects
    endpoint:
      path: "catalog/list"
      data_selector: "objects"

  # ── Locations ────────────────────────────────────────────────────────────────
  # GET /v2/locations — returns all locations in a single response (no pagination).
  # Response key: locations.
  - name: locations
    endpoint:
      path: "locations"
      data_selector: "locations"
    write_disposition: replace

  # ── Team Members ─────────────────────────────────────────────────────────────
  # POST /v2/team-members/search — paginated list via POST body.
  # Limit 1-200 (default 100). Response key: team_members.
  - name: team_members
    endpoint:
      path: "team-members/search"
      method: POST
      data_selector: "team_members"
      json:
        limit: 200
        query:
          filter:
            status: "ACTIVE"

write_endpoints:

  # ── Orders ───────────────────────────────────────────────────────────────────

  - name: create_order
    description: "Create a new order"
    method: POST
    path: "orders"
    write: true

  - name: update_order
    description: "Update an existing order (idempotency_key required)"
    method: PUT
    path: "orders/{order_id}"
    write: true

  # ── Customers ────────────────────────────────────────────────────────────────

  - name: create_customer
    description: "Create a new customer profile"
    method: POST
    path: "customers"
    write: true

  - name: update_customer
    description: "Update an existing customer profile"
    method: PUT
    path: "customers/{customer_id}"
    write: true

  - name: delete_customer
    description: "Delete a customer profile"
    method: DELETE
    path: "customers/{customer_id}"
    write: true

  - name: search_customers
    description: "Search customers by filter (created_at range, email, phone, etc.)"
    method: POST
    path: "customers/search"
    write: true

  # ── Invoices ─────────────────────────────────────────────────────────────────

  - name: create_invoice
    description: "Create a draft invoice for an order"
    method: POST
    path: "invoices"
    write: true

  - name: update_invoice
    description: "Update an invoice (must include version for optimistic locking)"
    method: PUT
    path: "invoices/{invoice_id}"
    write: true

  - name: publish_invoice
    description: "Publish a draft invoice (sends to recipient)"
    method: POST
    path: "invoices/{invoice_id}/publish"
    write: true

  - name: cancel_invoice
    description: "Cancel a scheduled or in-progress invoice"
    method: POST
    path: "invoices/{invoice_id}/cancel"
    write: true

  - name: delete_invoice
    description: "Delete a draft invoice"
    method: DELETE
    path: "invoices/{invoice_id}"
    write: true

  # ── Catalog ──────────────────────────────────────────────────────────────────

  - name: upsert_catalog_object
    description: "Create or update a single catalog object (item, variation, category, etc.)"
    method: POST
    path: "catalog/object"
    write: true

  - name: delete_catalog_object
    description: "Delete a catalog object and its descendants"
    method: DELETE
    path: "catalog/object/{object_id}"
    write: true

  - name: batch_upsert_catalog
    description: "Create or update up to 10,000 catalog objects in a single request"
    method: POST
    path: "catalog/batch-upsert"
    write: true
    bulk: true
    max_batch_size: 10000

  - name: batch_delete_catalog
    description: "Delete a batch of catalog objects"
    method: POST
    path: "catalog/batch-delete"
    write: true
    bulk: true
